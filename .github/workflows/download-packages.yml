name: Download Python Packages for Windows

on:
  workflow_dispatch:  # 手动触发

jobs:
  download:
    runs-on: windows-latest   # 关键：改用 Windows 环境
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Download packages
        run: |
          mkdir packages
          pip download -r requirements.txt -d ./packages
      
      - name: Compress to zip (Windows compatible)
        run: Compress-Archive -Path ./packages -DestinationPath ./python3.12_packages.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-packages-windows
          path: python3.12_packages.zip
